<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${quiz.title}">Kvíz</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        .question-card { background: white; padding: 20px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .options label { display: block; margin: 5px 0; cursor: pointer; }
    </style>
</head>
<body>

<a th:href="@{/courses/{id}(id=${courseUuid})}">← Zpět na kurz</a>
<h1 th:text="${quiz.title}">Název kvízu</h1>

<!-- Pozor: Odeslání tohoto formuláře vyžaduje zpracování na backendu, které přijme odpovědi -->
<!-- Pro View Controller verzi bys musel udělat metodu handlePlaySubmit -->
<form>
    <div th:each="question, stat : ${quiz.questions}" class="question-card">
        <h3 th:text="${stat.count + '. ' + question.question}">1. Otázka?</h3>

        <div class="options">
            <!-- Iterace možností -->
            <div th:each="option, optStat : ${question.options}">
                <label>
                    <input type="radio" th:name="${question.uuid}" th:value="${optStat.index}" />
                    <span th:text="${option}">Možnost A</span>
                </label>
            </div>
        </div>
    </div>

    <button type="button" onclick="alert('Odeslání kvízu z tohoto view zatím není napojeno na REST API.')"
            style="padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 4px;">
        Odeslat odpovědi
    </button>
</form>

</body>
</html>
