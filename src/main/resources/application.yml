spring:
  application:
    name: tda26

  # PostgreSQL databáze
  datasource:
    # ZMĚNA: Defaultní host je 'db' a databáze 'tda_app' (aby to sedělo s Docker Compose)
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/tda_app}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:TenBobr69!}
    driver-class-name: org.postgresql.Driver

  # JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # File Upload (max 30MB)
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB
      enabled: true

  # Security - základní credentials
  security:
    user:
      name: lecturer
      password: TdA26!

  # MVC nastavení (přeneseno z properties)
  mvc:
    throw-exception-if-no-handler-found: true
    static-path-pattern: /static/**

# Server
server:
  port: 8080
  error:
    include-message: always

# OpenAPI dokumentace
springdoc:
  api-docs:
    path: /api
  swagger-ui:
    path: /swagger-ui.html

# Vlastní nastavení
app:
  file:
    upload-dir: ./uploads
