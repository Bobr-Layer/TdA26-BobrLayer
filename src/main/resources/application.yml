spring:
  application:
    name: tda26

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/tda_app}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:TenBobr69!}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
