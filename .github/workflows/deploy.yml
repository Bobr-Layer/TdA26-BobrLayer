name: Deploy to Tour de App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload to TdA
        uses: Student-Cyber-Games/upload-app@v1
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          token: ${{ secrets.TDA_TOKEN }}
